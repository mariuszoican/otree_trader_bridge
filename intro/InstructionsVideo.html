{% extends "trader_bridge_app/Page.html" %}

{% block title %}Instructions Video{% endblock %}

{% block styles %}
 
<style>
  .video-page {
    max-width: 980px;
    margin: 0 auto;
  }

  .video-card {
    background: #ffffff;
    border: 1px solid #d9e2ec;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
  }

  .video-kicker {
    margin: 0 0 8px 0;
    color: #0f766e;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.78rem;
    font-weight: 700;
  }

  .video-title {
    margin: 0;
    font-size: 1.95rem;
    line-height: 1.1;
  }

  .video-copy {
    margin: 12px 0 0 0;
    color: #486581;
    max-width: 760px;
  }

  .video-frame {
    position: relative;
    margin-top: 18px;
    width: 100%;
    padding-top: 56.25%;
    border-radius: 18px;
    overflow: hidden;
    background: #0f172a;
  }

  .video-frame iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .video-actions {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
  }
</style>
{% endblock %}

{% block content %}
<div class="video-page">
  <section class="video-card">
    <p class="video-kicker">Training</p>
    <h2 class="video-title">Interface Walkthrough</h2>
    <p class="video-copy">
      Watch this short explainer before continuing to the comprehension questions.
    </p>
    <div class="video-frame">
      <iframe
        src="https://www.youtube-nocookie.com/embed/_ujlBTZVXio"
        title="Trading instructions video"
        allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>
    <div class="video-actions">
      {{ next_button }}
    </div>
  </section>
</div>
{% endblock %}
