{% extends "trader_bridge_app/Page.html" %}
{% block content %}

<style>
    .btn-secondary {
    margin: 5px;
    color: #fff;
    background-color: #6c757d;
    border-color: #6c757d;
}
    .btn-secondary.active {
    margin: 5px;
    color: #fff;
    background-color: blue;
    border-color: #6c757d;
}
    .sv-components-column {
     display: block;
    flex-direction: column;
    background: white;
}
    .sv_main .sv-action__content > * {
    background: blue;
    color:white;
}
        input.sd-btn.sd-btn--action.sd-navigation__complete-btn {
    background: blue;
    color:white;
}
    label.sd-rating__item.sd-rating__item--selected.sd-rating__item--fixed-size{
    background: blue;
    }
    h3.sd-title {
        color: blue!important;
}
    .sd-item--checked .sd-item__decorator {
    background: blue!important;
}
    .sd-root--compact .sd-body__navigation .sd-btn:not(.sd-btn--action) {
    background-color: blue!important;
    color: white!important;
}

</style>
<div id="surveyContainer"></div>
<input type="hidden" id="surveyResults" name="surveyResults" value="">
<input type="hidden" id="cqAttemptCount" name="cqAttemptCount" value="0">
<input type="hidden" id="cqWrongFirstTry" name="cqWrongFirstTry" value="false">
<script>

    const surveyJSON = js_vars.survey_json;
    const surveyResultsInput = document.getElementById('surveyResults');
    const cqAttemptCountInput = document.getElementById('cqAttemptCount');
    const cqWrongFirstTryInput = document.getElementById('cqWrongFirstTry');
    let cqFailedAttemptCount = 0;

    const survey = new Survey.Model(surveyJSON);

    function persistAttemptMetrics(totalAttemptCount) {
        const normalizedAttemptCount = Math.max(1, Number(totalAttemptCount) || 1);
        cqAttemptCountInput.value = String(normalizedAttemptCount);
        cqWrongFirstTryInput.value = cqFailedAttemptCount > 0 ? 'true' : 'false';
    }

    survey.applyTheme(SurveyTheme.LayeredLightPanelless);
    const validationEvent = survey.onValidatedErrorsOnCurrentPage || survey.onValidatePage;
    validationEvent.add(function (_, options) {
        if ((options && options.errors && options.errors.length > 0) || survey.containsErrors) {
            cqFailedAttemptCount += 1;
        }
    });
    // Initialize the survey
    // Save results on completion
    survey.onComplete.add(function (result) {
        persistAttemptMetrics(cqFailedAttemptCount + 1);
        const surveyResults = JSON.stringify(result.data);
        console.log("Survey Results: ", surveyResults);

        // Submit the results via POST or other methods
        // Example: Sending to a hidden form field
        surveyResultsInput.value = surveyResults;
        $('#form').submit();
    });

    // Render the survey
    Survey.StylesManager.applyTheme("bootstrap");
    $("#surveyContainer").Survey({model: survey});
</script>


{% endblock %}
